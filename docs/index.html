<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: wss:; connect-src 'self' https: wss:; media-src 'self' blob:; img-src 'self' data: blob:;" />
  <title>✦ АРТЕМІС — Live Voice</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin: 0; background: #0a0a1a; }
    #initializing {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 20px;
      position: relative; z-index: 10;
    }
    #app { display: none; }
  </style>
</head>
<body>
  <!-- Ініціалізація -->
  <div id="initializing" class="initializing">
    <div class="loader-pulse"></div>
    <div class="init-text">Завантаження Артеміс...</div>
  </div>

  <!-- Помилка -->
  <div id="errorView" class="error-state" style="display:none;">
    <div class="error-icon">⚠️</div>
    <div class="error-title" id="errorTitle">Помилка</div>
    <div class="error-text" id="errorText"></div>
    <button class="btn-retry" onclick="retry()">Спробувати ще</button>
  </div>

  <!-- Головний додаток -->
  <div id="app" class="app-container">
    <!-- Аватар з анімацією -->
    <div id="avatarSection" class="avatar-section disconnected">
      <div class="avatar-container">
        <div id="auraRing" class="aura-ring"></div>
        <img id="artemisAvatar" src="artemis-avatar.svg" width="120" height="120" alt="Артеміс" style="display:block;">
      </div>
    </div>

    <!-- Статус -->
    <div class="status-container">
      <div id="statusText" class="status-text">Натисни, щоб почати</div>
    </div>

    <!-- Візуалізатор -->
    <div class="visualizer-container">
      <canvas id="audioVisualizer" width="800" height="120"></canvas>
    </div>

    <!-- Головна кнопка -->
    <div class="main-button-container">
      <button id="mainButton" class="main-button disconnected">
        <span id="mainButtonIcon">🎤</span>
      </button>
      <div id="mainButtonLabel" class="main-button-label">Натисни і говори</div>
    </div>

    <!-- Чат (транскрипт) -->
    <div id="chatContainer" class="chat-container"></div>

    <!-- Футер -->
    <div class="footer">
      <button id="disconnectBtn" class="btn-disconnect" style="display:none;">
        ✕ Завершити
      </button>
      <div class="footer-version">✦ АРТЕМІС ✦ — Gemini Live</div>
    </div>
  </div>

  <!-- Скрипти (порядок важливий!) -->
  <script src="geminilive.js"></script>
  <script src="mediaUtils.js"></script>
  <script src="script.js"></script>
</body>
</html>
